# Konfigurasi nginx untuk POS_GYM.
# Simpan di: /etc/nginx/sites-available/posgym  lalu symlink ke sites-enabled.
# Ganti server_name dengan domain (atau IP VPS) milikmu.
#
# Pola: satu domain melayani frontend (Flutter web) + backend (Go) di /api & /uploads.
# Dengan begitu API_BASE_URL = https://domainmu.com (sama-origin, bebas masalah CORS).

server {
    listen 80;
    listen [::]:80;
    server_name posgym.example.com;   # <-- GANTI: domain atau IP VPS

    # Hasil `flutter build web` diunggah ke folder ini.
    root /var/www/posgym;
    index index.html;

    # Batas ukuran upload (foto F&B maks 5 MB di backend).
    client_max_body_size 8M;

    # Flutter web (SPA) — semua rute non-file dilayani index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API Go.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Gambar menu F&B yang diunggah (dilayani backend Go).
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}

# Catatan: setelah pasang HTTPS dengan certbot (lihat DEPLOY.md), certbot
# otomatis menambahkan blok `listen 443 ssl` + sertifikat ke file ini.
